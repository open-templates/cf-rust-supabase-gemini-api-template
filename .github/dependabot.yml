version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # assignees:
    #   - acme
    commit-message:
      prefix: chore
      include: scope
    allow:
      - dependency-type: direct
      - dependency-type: indirect
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # assignees:
    #   - acme
    commit-message:
      prefix: ci
      include: scope
